server {
  listen PORT_PLACEHOLDER;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml
    font/ttf
    font/otf
    application/font-woff
    application/font-woff2;

  # Hashed Vite assets are immutable — cache aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # The HTML shell must always reflect the latest deploy.
  location = /index.html {
    add_header Cache-Control "no-store, must-revalidate";
    try_files $uri =404;
  }

  # SPA fallback — every other route renders the React app.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
